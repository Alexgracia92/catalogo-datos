<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centra horizontalmente todo el contenido */
            background-color: #f9f9f9;
        }

        h1 { 
            text-align: center; 
            color: #333;
            margin-bottom: 30px;
        }

        /* Contenedor que agrupa los productos y los centra */
        #catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fill, 220px); /* Subimos a 220px para mejor espacio */
            gap: 25px;
            justify-content: center; /* Centra los cuadros en la pantalla */
            width: 100%;
            max-width: 1200px;
        }
        
        .producto { 
            border: 1px solid #e0e0e0; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* Le da un acabado más profesional */
            box-sizing: border-box;
            overflow: hidden; /* Evita que cualquier elemento se desborde */
        }
        
        .producto img { 
            width: 100%; 
            height: 200px; 
            object-fit: contain; /* Cambiado a contain para que los frascos de cremas no se corten */
            border-radius: 6px; 
            margin-bottom: 15px;
        }

        /* 👑 AQUÍ ESTÁ EL TRUCO PARA LOS NOMBRES LARGOS */
        .producto h3 {
            font-size: 0.95rem; /* Achicamos un poco la letra para que quepa mejor */
            margin: 10px 0;
            color: #222;
            width: 100%; /* Ocupa todo el ancho disponible del cuadro */
            
            /* Fuerza a romper el texto largo y los guiones bajos */
            word-break: break-word; 
            overflow-wrap: break-word;
            white-space: normal; 
            
            /* Centrado absoluto */
            display: block;
            text-align: center;
        }

        .producto p {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e91e63; /* Un tono rosa estético para Victoria's Secret */
            margin: 5px 0 0 0;
        }
    </style>
</head>
<body>

    <h1>CATÁLOGO VICTORIA'S SECRET & BATH & BODY WORKS</h1>

    <div id="catalogo">Cargando productos...</div>

    <script>
        fetch('productos.json')
            .then(response => response.json())
            .then(data => {
                const contenedor = document.getElementById('catalogo');
                contenedor.innerHTML = '';
                data.forEach(p => {
                    contenedor.innerHTML += `
                        <div class="producto">
                            <img src="${p.url_imagen}" alt="${p.nombre}">
                            <h3>${p.nombre}</h3>
                            <p>$${parseFloat(p.precio).toFixed(2)}</p>
                        </div>
                    `;
                });
            })
            .catch(error => {
                console.error("Error cargando el JSON:", error);
                document.getElementById('catalogo').innerHTML = "Error al cargar los productos.";
            });
    </script>
</body>
</html>
